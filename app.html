<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bloom Finance</title>
  <link rel="stylesheet" href="app.css" />
  <!-- html2pdf for exporting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <!-- App Shell -->
  <div class="app-shell">
    
    <!-- Topbar (Minimalist) -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">Bloom</div>
        <nav class="top-nav">
          <button class="nav-item active" data-page="spreadsheet">Planilha</button>
          <button class="nav-item" data-page="receivables">A Receber</button>
          <button class="nav-item" data-page="reports">Relatórios</button>
          <button class="nav-item" data-page="settings">Ajustes</button>
        </nav>
      </div>
      
      <div class="topbar-right">
        <div class="search-container">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Pesquisar..." autocomplete="off" />
        </div>
        <div class="balance-display" id="availableBalance" title="Saldo atual disponível">R$ 171,72</div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="app-main">
      
      <!-- PAGE: SPREADSHEET -->
      <section class="page active" id="page-spreadsheet">
        <div class="spreadsheet-wrapper" id="spreadsheetWrapper">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- PAGE: A RECEBER -->
      <section class="page" id="page-receivables">
        <div class="page-container">
          <header class="page-header">
            <h1 class="page-title">Valores a Receber</h1>
            <p class="page-sub">Controle quem precisa te pagar. Marque como recebido para remover da lista.</p>
          </header>
          
          <div class="receivables-grid" id="receivablesGrid">
            <!-- Rendered by JS -->
          </div>
        </div>
      </section>

      <!-- PAGE: RELATÓRIOS -->
      <section class="page" id="page-reports">
        <div class="page-container">
          <header class="page-header">
            <h1 class="page-title">Relatórios</h1>
            <p class="page-sub">Exporte seus dados com um clique.</p>
          </header>
          
          <div class="reports-actions">
            <button class="btn" id="btnExportPDF">Baixar PDF</button>
            <button class="btn" id="btnExportCSV">Baixar CSV</button>
            <button class="btn" id="btnExportJSON">Baixar Excel (JSON)</button>
          </div>
          
          <div id="pdfReport" style="display:none; padding:40px; width:800px; background:white; color:black;">
            <h1 style="font-size:24px; font-weight:600; border-bottom:1px solid #E5E5E5; padding-bottom:16px; margin-bottom:24px;">Resumo Financeiro</h1>
            <div id="pdfContent"></div>
          </div>
        </div>
      </section>

      <!-- PAGE: CONFIGURAÇÕES -->
      <section class="page" id="page-settings">
        <div class="page-container">
          <header class="page-header">
            <h1 class="page-title">Ajustes</h1>
          </header>
          
          <div class="settings-panel">
            <div class="setting-row">
              <div class="setting-info">
                <h3>Modo Escuro</h3>
                <p>Altera a interface para cores escuras.</p>
              </div>
              <input type="checkbox" id="themeToggle" class="toggle-switch" />
            </div>
            <div class="setting-row" style="border-top:1px solid var(--border); padding-top:24px; margin-top:24px;">
              <div class="setting-info">
                <h3 style="color:var(--red);">Apagar Sistema</h3>
                <p>Remove todos os dados permanentemente.</p>
              </div>
              <button class="btn danger" id="btnWipeData">Redefinir</button>
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- INTELLIGENT COMMAND BAR -->
    <div class="command-bar-wrapper">
      <div class="command-bar" id="commandBar">
        <div class="ai-icon" id="aiIcon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a2 2 0 0 1 2 2c0 1.1-.9 2-2 2a2 2 0 0 1-2-2c0-1.1.9-2 2-2z"/><path d="M19 8a2 2 0 0 1 2 2c0 1.1-.9 2-2 2a2 2 0 0 1-2-2c0-1.1.9-2 2-2z"/><path d="M5 8a2 2 0 0 1 2 2c0 1.1-.9 2-2 2a2 2 0 0 1-2-2c0-1.1.9-2 2-2z"/><path d="M12 14a2 2 0 0 1 2 2c0 1.1-.9 2-2 2a2 2 0 0 1-2-2c0-1.1.9-2 2-2z"/><path d="M12 8l-7 6"/><path d="M12 8l7 6"/><path d="M12 14l-7 6"/><path d="M12 14l7 6"/></svg>
        </div>
        <input type="text" id="aiInput" class="command-input" placeholder="Fale ou digite naturalmente. Ex: 'Gastei 15 com almoço', 'Resumo do mês'..." autocomplete="off" />
        <button class="voice-btn" id="voiceBtn" title="Falar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </button>
      </div>
      <!-- AI Reply Popup -->
      <div class="ai-reply" id="aiReply">
        <div class="ai-reply-content" id="aiReplyContent"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
